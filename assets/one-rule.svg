<svg baseProfile="full" height="900" version="1.1" viewBox="0 0 1600 900" width="1600" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#F5F1E9" height="900" width="1600" x="0" y="0" /><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="47" font-weight="bold" opacity="1.0" text-anchor="start" x="70" y="82">THE ONE RULE:</text><text fill="#698664" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="47" font-weight="bold" opacity="1.0" text-anchor="start" x="460.71" y="82">grounded</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="47" font-weight="bold" opacity="1.0" text-anchor="start" x="690.0699999999999" y="82">, or it </text><text fill="#698664" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="47" font-weight="bold" opacity="1.0" text-anchor="start" x="919.43" y="82">abstains</text><rect fill="#FAF7F1" height="116" rx="18" ry="18" stroke="#BBB3A8" stroke-width="1.5" width="320" x="70" y="340" /><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="27" font-weight="normal" opacity="1.0" text-anchor="middle" x="230" y="410">$ retrieve &lt;query&gt;</text><polygon fill="#FAF7F1" points="620,285 760,398 620,511 480,398" stroke="#BBB3A8" stroke-width="2.2" /><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="27" font-weight="normal" opacity="1.0" text-anchor="middle" x="620" y="365.0">evidence</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="27" font-weight="normal" opacity="1.0" text-anchor="middle" x="620" y="396.05">in the</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="27" font-weight="normal" opacity="1.0" text-anchor="middle" x="620" y="427.1">store?</text><line stroke="#4A4640" stroke-linecap="round" stroke-width="2.2" x1="390" x2="470" y1="398" y2="398" /><polygon fill="#4A4640" points="470,398 459.0237369684738,404.965748334727 459.0237369684738,391.034251665273" /><line stroke="#4A4640" stroke-width="2.2" x1="760" x2="920" y1="398" y2="398" /><line stroke="#4A4640" stroke-width="2.2" x1="920" x2="920" y1="222" y2="660" /><rect fill="#FAF7F1" height="150" rx="18" ry="18" stroke="#698664" stroke-width="2.3" width="540" x="980" y="150" /><rect fill="#698664" height="150" rx="5" ry="5" width="10" x="980" y="150" /><text fill="#698664" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="28" font-weight="bold" opacity="1.0" text-anchor="start" x="1018" y="197">grounded</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="19" font-weight="normal" opacity="1.0" text-anchor="start" x="1018" y="236.0">evidence returned, with source, freshness,</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="19" font-weight="normal" opacity="1.0" text-anchor="start" x="1018" y="260.32">relevance attached</text><rect fill="#FAF7F1" height="180" rx="18" ry="18" stroke="#C88B32" stroke-width="2.3" width="540" x="980" y="350" /><rect fill="#C88B32" height="180" rx="5" ry="5" width="10" x="980" y="350" /><text fill="#C88B32" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="28" font-weight="bold" opacity="1.0" text-anchor="start" x="1018" y="397">missing_evidence</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="19" font-weight="normal" opacity="1.0" text-anchor="start" x="1018" y="436.0">matches existed, every one excluded —</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="19" font-weight="normal" opacity="1.0" text-anchor="start" x="1018" y="460.32">superseded or falsified, with the reason</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="19" font-weight="normal" opacity="1.0" text-anchor="start" x="1018" y="484.64">counted</text><rect fill="#FAF7F1" height="150" rx="18" ry="18" stroke="#8E8982" stroke-width="2.3" width="540" x="980" y="580" /><rect fill="#8E8982" height="150" rx="5" ry="5" width="10" x="980" y="580" /><text fill="#8E8982" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="28" font-weight="bold" opacity="1.0" text-anchor="start" x="1018" y="627">abstain</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="19" font-weight="normal" opacity="1.0" text-anchor="start" x="1018" y="666.0">zero matches. It says so.</text><line stroke="#4A4640" stroke-linecap="round" stroke-width="2.0" x1="920" x2="970" y1="225" y2="225" /><polygon fill="#4A4640" points="970,225 959.8680648939758,231.42992153974797 959.8680648939758,218.57007846025203" /><line stroke="#4A4640" stroke-linecap="round" stroke-width="2.0" x1="920" x2="970" y1="440" y2="440" /><polygon fill="#4A4640" points="970,440 959.8680648939758,446.42992153974797 959.8680648939758,433.57007846025203" /><line stroke="#4A4640" stroke-linecap="round" stroke-width="2.0" x1="920" x2="970" y1="655" y2="655" /><polygon fill="#4A4640" points="970,655 959.8680648939758,661.429921539748 959.8680648939758,648.570078460252" /><rect fill="#F0EAE0" height="34" rx="8" ry="8" stroke="#D7D0C6" stroke-width="1" width="240" x="1240" y="682" /><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="15" font-weight="normal" opacity="1.0" text-anchor="middle" x="1360" y="706">{ "outcome": "abstain" }</text><line stroke="#BBB3A8" stroke-width="1.5" x1="0" x2="1600" y1="800" y2="800" /><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="25" font-weight="normal" opacity="1.0" text-anchor="start" x="70" y="850">Three honest outcomes. Recall never invents a fourth.</text></svg>