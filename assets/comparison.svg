<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="1200" version="1.1" viewBox="0 0 1200 1200" width="1200" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#F5F1E9" height="1200" width="1200" x="0" y="0" /><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="40" font-weight="bold" opacity="1.0" text-anchor="middle" x="600" y="84">memory for agents, two philosophies</text><text fill="#698664" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="24.96" font-weight="bold" opacity="1.0" text-anchor="start" x="194.62720000000002" y="194.36">n</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="52" font-weight="bold" letter-spacing="2.6" opacity="1.0" text-anchor="start" x="215.0528" y="185">MEMORY</text><text fill="#8E8982" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="30" font-weight="bold" opacity="1.0" text-anchor="middle" x="900" y="185">typical memory layer</text><line stroke="#BBB3A8" stroke-width="1.5" x1="600" x2="600" y1="150" y2="1005" /><line stroke="#D7D0C6" stroke-width="1.2" x1="60" x2="1140" y1="230" y2="230" /><line stroke="#D7D0C6" stroke-width="1.2" x1="60" x2="1140" y1="385" y2="385" /><line stroke="#D7D0C6" stroke-width="1.2" x1="60" x2="1140" y1="540" y2="540" /><line stroke="#D7D0C6" stroke-width="1.2" x1="60" x2="1140" y1="695" y2="695" /><line stroke="#D7D0C6" stroke-width="1.2" x1="60" x2="1140" y1="850" y2="850" /><line stroke="#D7D0C6" stroke-width="1.2" x1="60" x2="1140" y1="1005" y2="1005" /><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="bold" opacity="1.0" text-anchor="start" x="95" y="304.0">abstains when it has nothing</text><text fill="#8E8982" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="normal" opacity="1.0" text-anchor="start" x="650" y="304.0">always answers something</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="bold" opacity="1.0" text-anchor="start" x="95" y="459.0">provenance mandatory — no source,</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="bold" opacity="1.0" text-anchor="start" x="95" y="486.5">rejected</text><text fill="#8E8982" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="normal" opacity="1.0" text-anchor="start" x="650" y="459.0">provenance optional</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="bold" opacity="1.0" text-anchor="start" x="95" y="614.0">one file on your disk</text><text fill="#8E8982" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="normal" opacity="1.0" text-anchor="start" x="650" y="614.0">their cloud</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="bold" opacity="1.0" text-anchor="start" x="95" y="769.0">zero network sockets</text><text fill="#8E8982" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="normal" opacity="1.0" text-anchor="start" x="650" y="769.0">API calls per recall</text><text fill="#36332F" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="bold" opacity="1.0" text-anchor="start" x="95" y="924.0">returns evidence — never instructions</text><text fill="#8E8982" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="22" font-weight="normal" opacity="1.0" text-anchor="start" x="650" y="924.0">output goes straight into the prompt</text><rect fill="#FAF7F1" height="110" rx="18" ry="18" stroke="#BBB3A8" stroke-width="1.5" width="1080" x="60" y="1030" /><text fill="#698664" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="25" font-weight="bold" opacity="1.0" text-anchor="start" x="95" y="1098">grounded, or it abstains</text><text fill="#8E8982" font-family="DejaVu Sans Mono, Noto Sans Mono, monospace" font-size="21" font-weight="normal" opacity="1.0" text-anchor="end" x="1105" y="1098">AGPL-3.0 · Rust · 514 tests</text></svg>